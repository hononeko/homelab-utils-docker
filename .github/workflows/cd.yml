name: Docker Build and Push (CD)

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'The image to build and deploy'
        required: true
        type: choice
        options:
          - k8s-backup-tools
          - k8s-config-tools

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for creating tags and releases
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0 # Needed for semantic-version to calculate version

      - name: Calculate Semantic Version
        id: version
        uses: PaulHatch/semantic-version@9f72830310d5ed81233b641ee59253644cd8a8fc # v6.0.2
        with:
          change_path: "images/${{ github.event.inputs.image_name }}"
          bump_each_commit: false
          tag_prefix: "${{ github.event.inputs.image_name }}-"
          major_pattern: "/(?:feat|fix|revert|chore)!:|BREAKING CHANGE:/"
          minor_pattern: "/feat(\\(.+\\))?:/"
          version_format: "${major}.${minor}.${patch}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/hononeko/${{ github.event.inputs.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./images/${{ github.event.inputs.image_name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate Changelog
        if: steps.version.outputs.version_tag
        run: |
          PREV_TAG=$(git describe --match "${{ github.event.inputs.image_name }}-*" --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"* %s (%h)" -- images/${{ github.event.inputs.image_name }} > changelog.txt
          else
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" -- images/${{ github.event.inputs.image_name }} > changelog.txt
          fi

      - name: Push Git Tag
        if: steps.version.outputs.version_tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.version_tag }}
          git push origin ${{ steps.version.outputs.version_tag }}

      - name: Create GitHub Release
        if: steps.version.outputs.version_tag
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          body_path: changelog.txt
